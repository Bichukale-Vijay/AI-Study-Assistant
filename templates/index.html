<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">

<style>

body{
background:
radial-gradient(circle at 10% 10%,#1e293b,#020617 60%);
font-family:Inter,system-ui,-apple-system,sans-serif;
color:#e2e8f0;
overflow:hidden;
}

/* glassmorphism */

.glass{
background:rgba(15,23,42,.55);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.05);
}

/* glowing borders */

.glow{
box-shadow:
0 0 20px rgba(59,130,246,.25),
0 0 60px rgba(59,130,246,.12);
}

/* sidebar */

.sidebar{
background:
linear-gradient(180deg,#020617,#0f172a);
border-right:1px solid rgba(255,255,255,.05);
}

/* bubbles */

.bubble{
max-width:70%;
padding:18px 20px;
border-radius:18px;
line-height:1.7;
position:relative;
}

.user{
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
}

.ai{
background:#1e293b;
}

/* message animation */

.message{
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

/* avatars */

.avatar{
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#3b82f6,#6366f1);
font-size:18px;
}

/* typing animation */

.typing span{
width:6px;
height:6px;
background:#94a3b8;
display:inline-block;
border-radius:50%;
margin:3px;
animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

/* input */

.inputbox{
background:#020617;
border:1px solid rgba(255,255,255,.1);
}

/* send button */

.sendbtn{
background:linear-gradient(135deg,#2563eb,#6366f1);
transition:.25s;
}

.sendbtn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(99,102,241,.5);
}

/* copy tool */

.tools{
position:absolute;
top:6px;
right:8px;
opacity:0;
font-size:12px;
cursor:pointer;
}

.bubble:hover .tools{
opacity:1;
}

/* scrollbar */

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:10px}

/* code blocks */

pre{
border-radius:12px;
padding:14px;
overflow:auto;
}

</style>

</head>

<body class="h-screen flex">

<!-- SIDEBAR -->

<div class="w-64 sidebar hidden md:flex flex-col">

<div class="p-6 border-b border-gray-800">

<div class="flex items-center gap-3 text-lg font-semibold">

<div class="avatar">🤖</div>

AI Study Assistant

</div>

<div class="text-xs text-gray-400 mt-1">

Your personal AI learning companion

</div>

</div>

<div class="flex-1 p-4 space-y-2 text-sm">

<div class="p-3 rounded-lg hover:bg-gray-800 cursor-pointer transition">

✨ New Chat

</div>

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col glass">

<!-- HEADER -->

<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">

<div class="flex items-center gap-3">

<div class="avatar">🤖</div>

<div class="font-semibold">

AI Study Assistant

</div>

</div>

<button
id="clearBtn"
class="bg-red-500 px-4 py-1.5 text-sm rounded-lg hover:bg-red-600 transition">

Clear Chat

</button>

</div>

<!-- CHAT -->

<div
id="chat"
class="flex-1 overflow-y-auto p-8 space-y-6">

</div>

<!-- INPUT -->

<div class="p-6 border-t border-gray-800">

<div class="inputbox glow rounded-xl flex items-center gap-4 px-5 py-4">

<textarea
id="question"
rows="1"
placeholder="Ask anything about your studies..."
class="flex-1 bg-transparent outline-none resize-none text-sm"></textarea>

<button
id="sendBtn"
class="sendbtn px-6 py-2 rounded-lg text-sm font-semibold">

Send 🚀

</button>

</div>

</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("question")
const sendBtn=document.getElementById("sendBtn")
const clearBtn=document.getElementById("clearBtn")

function scrollBottom(){
chat.scrollTop=chat.scrollHeight
}

function copyText(text){
navigator.clipboard.writeText(text)
}

function addMessage(text,sender,typing=false){

const msg=document.createElement("div")
msg.className=`message flex ${sender==="user"?"justify-end":""}`

if(typing){

msg.innerHTML=`

<div class="flex gap-3">

<div class="avatar">🤖</div>

<div>

<div class="text-xs text-gray-400 mb-1">
AI thinking...
</div>

<div class="bubble ai">

<div class="typing">
<span></span><span></span><span></span>
</div>

</div>

</div>

</div>
`

}else{

let bubble=sender==="user"?"user":"ai"
let content=sender==="ai"?marked.parse(text):text

msg.innerHTML=`

<div class="bubble ${bubble}">

<div class="tools"
onclick="copyText(\`${text}\`)">📋</div>

${content}

</div>
`

}

chat.appendChild(msg)

document.querySelectorAll("pre code").forEach(block=>{
hljs.highlightElement(block)
})

scrollBottom()

return msg
}

async function sendQuestion(){

const question=input.value.trim()
if(!question)return

addMessage(question,"user")

input.value=""

const typingMsg=addMessage("","ai",true)

sendBtn.disabled=true

try{

const res=await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question})
})

const data=await res.json()

typingMsg.innerHTML=`

<div class="flex gap-3">

<div class="avatar">🤖</div>

<div class="bubble ai">

<div class="tools"
onclick="copyText(\`${data.answer}\`)">📋</div>

${marked.parse(data.answer)}

<br>

<span class="text-xs text-gray-400">
⏱ ${data.time}s
</span>

</div>

</div>
`

}
catch(e){

typingMsg.innerHTML=`<div class="bubble bg-red-600">Server Error</div>`

}

sendBtn.disabled=false

}

sendBtn.onclick=sendQuestion

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
sendQuestion()
}
})

clearBtn.onclick=()=>{
chat.innerHTML=""
}

input.addEventListener("input",()=>{
input.style.height="auto"
input.style.height=input.scrollHeight+"px"
})

input.focus()

</script>

</body>
</html>
